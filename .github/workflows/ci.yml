name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Write dummy .env for type generation
        run: |
          cat > .env <<'EOF'
          PUBLIC_SANITY_PROJECT_ID=ci
          PUBLIC_SANITY_DATASET=ci
          PUBLIC_SANITY_API_VERSION=2026-04-20
          EOF

      - run: npm run check

      - run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Browsers + system deps come pre-baked in this image, so there is no
    # `playwright install` download step (which hangs at 100% during extraction
    # on the bare runner). The tag MUST match the @playwright/test version in
    # package-lock.json, or Playwright re-downloads a matching browser.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    # Placeholder values — the smoke test doesn't authenticate or hit Sanity.
    # DATABASE_URL only needs to be a parseable connection string.
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      ORIGIN: http://localhost:4173
      BETTER_AUTH_SECRET: ci-placeholder-secret-not-used-for-anything-real
      PUBLIC_SANITY_PROJECT_ID: ci
      PUBLIC_SANITY_DATASET: production
      PUBLIC_SANITY_API_VERSION: 2026-04-20
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run smoke e2e
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
