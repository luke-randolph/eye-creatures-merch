name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Write dummy .env for type generation
        run: |
          cat > .env <<'EOF'
          PUBLIC_SANITY_PROJECT_ID=ci
          PUBLIC_SANITY_DATASET=ci
          PUBLIC_SANITY_API_VERSION=2026-04-20
          EOF

      - run: npm run check

      - run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Placeholder values — the smoke test doesn't authenticate or hit Sanity.
    # DATABASE_URL only needs to be a parseable connection string.
    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      ORIGIN: http://localhost:4173
      BETTER_AUTH_SECRET: ci-placeholder-secret-not-used-for-anything-real
      PUBLIC_SANITY_PROJECT_ID: ci
      PUBLIC_SANITY_DATASET: production
      PUBLIC_SANITY_API_VERSION: 2026-04-20
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # System libs (apt) can't be cached and need root, so install them every run.
      # The browser binaries themselves come from the cache above on a hit.
      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            timeout 360 npx playwright install chromium && exit 0
            echo "Attempt $i stalled or failed, retrying..."
          done
          echo "Playwright browser install failed after 3 attempts" >&2
          exit 1

      - name: Run smoke e2e
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
